<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>GitHub Issues Tracker – Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }

    @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .modal-in { animation: modalIn 0.2s ease forwards; }

    .card-open  { border-top: 3px solid #22c55e; }
    .card-closed { border-top: 3px solid #a855f7; }

    .priority-HIGH   { background:#fee2e2; color:#dc2626; }
    .priority-MEDIUM { background:#fef9c3; color:#ca8a04; }
    .priority-LOW    { background:#f1f5f9; color:#64748b; }

    .label-bug         { background:#fee2e2; color:#dc2626; }
    .label-help-wanted { background:#fef3c7; color:#b45309; }
    .label-feature     { background:#dbeafe; color:#2563eb; }
    .label-enhancement { background:#dcfce7; color:#16a34a; }
    .label-documentation { background:#ede9fe; color:#7c3aed; }
    .label-default     { background:#f1f5f9; color:#475569; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">

      <!-- logo -->
      <div class="flex items-center gap-2 shrink-0">
        <svg class="w-7 h-7" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
          <path fill="#1b1f23" fill-rule="evenodd" clip-rule="evenodd"
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
        </svg>
        <span class="font-bold text-gray-900 text-lg">GitHub Issues Tracker</span>
      </div>

      <!-- Search -->
      <div class="flex items-center gap-3 flex-1 justify-end">
        <div class="relative flex-1 max-w-xs">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search issues..."
            class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-gray-50"
            onkeydown="if(event.key==='Enter') doSearch()" />
        </div>
        <button onclick="doSearch()"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors hidden sm:block">
          Search
        </button>
      </div>
    </div>
  </nav>







  
</body>
</html>
