<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker – Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }

    @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .modal-in { animation: modalIn 0.2s ease forwards; }

    .card-open  { border-top: 3px solid #22c55e; }
    .card-closed { border-top: 3px solid #a855f7; }

    .priority-HIGH   { background:#fee2e2; color:#dc2626; }
    .priority-MEDIUM { background:#fef9c3; color:#ca8a04; }
    .priority-LOW    { background:#f1f5f9; color:#64748b; }

    .label-bug         { background:#fee2e2; color:#dc2626; }
    .label-help-wanted { background:#fef3c7; color:#b45309; }
    .label-feature     { background:#dbeafe; color:#2563eb; }
    .label-enhancement { background:#dcfce7; color:#16a34a; }
    .label-documentation { background:#ede9fe; color:#7c3aed; }
    .label-default     { background:#f1f5f9; color:#475569; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- ── NAVBAR ── -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">

      <!-- Left: logo + name -->
      <div class="flex items-center gap-2 shrink-0">
        <svg class="w-7 h-7" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
          <path fill="#1b1f23" fill-rule="evenodd" clip-rule="evenodd"
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
        </svg>
        <span class="font-bold text-gray-900 text-lg">GitHub Issues Tracker</span>
      </div>

      <!-- Right: search + new issue -->
      <div class="flex items-center gap-3 flex-1 justify-end">
        <div class="relative flex-1 max-w-xs">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search issues..."
            class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-gray-50"
            onkeydown="if(event.key==='Enter') doSearch()" />
        </div>
        <button onclick="doSearch()"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors hidden sm:block">
          Search
        </button>
      </div>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- Tabs -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-2 inline-flex gap-1 mb-6">
      <button data-tab="all" onclick="switchTab('all')"
        class="tab-btn active-tab px-5 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
        All
        <span id="count-all" class="text-xs font-bold bg-white/30 px-2 py-0.5 rounded-full">—</span>
      </button>
      <button data-tab="open" onclick="switchTab('open')"
        class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2">
        Open
        <span id="count-open" class="text-xs font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">—</span>
      </button>
      <button data-tab="closed" onclick="switchTab('closed')"
        class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2">
        Closed
        <span id="count-closed" class="text-xs font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">—</span>
      </button>
    </div>

    <!-- Issue summary bar -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 px-6 py-4 mb-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div>
          <p id="issue-total" class="font-bold text-gray-900 text-lg">— Issues</p>
          <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-5 text-sm font-medium">
        <span class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
          <span class="text-gray-600">Open</span>
          <span id="summary-open" class="font-bold text-green-600">—</span>
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"></span>
          <span class="text-gray-600">Closed</span>
          <span id="summary-closed" class="font-bold text-purple-600">—</span>
        </span>
      </div>
    </div>

    <!-- Loading spinner -->
    <div id="loading" class="flex justify-center py-20">
      <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full spin"></div>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden text-center py-20 text-gray-500">
      <p class="text-4xl mb-3">⚠️</p>
      <p class="font-semibold text-gray-700">Failed to load issues</p>
      <p class="text-sm mt-1">Check your connection and try again.</p>
      <button onclick="loadIssues()" class="mt-4 px-5 py-2 bg-indigo-600 text-white rounded-lg text-sm">Retry</button>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20 text-gray-400">
      <p class="text-4xl mb-3">📭</p>
      <p class="font-semibold text-gray-600">No issues found</p>
      <p class="text-sm mt-1">Try a different search or filter.</p>
    </div>

    <!-- Cards grid -->
    <div id="cards-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

  </main>

  <!-- ── MODAL ── -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onclick="closeModal(event)">
    <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg modal-in" onclick="event.stopPropagation()">
      <div class="p-8">
        <h2 id="modal-title" class="text-2xl font-bold text-gray-900 mb-3"></h2>

        <!-- status + meta -->
        <div id="modal-meta" class="flex items-center gap-2 flex-wrap text-sm text-gray-500 mb-4"></div>

        <!-- labels -->
        <div id="modal-labels" class="flex gap-2 flex-wrap mb-5"></div>

        <!-- description -->
        <p id="modal-desc" class="text-gray-600 leading-relaxed mb-6"></p>

        <!-- assignee + priority grid -->
        <div class="bg-slate-50 rounded-xl p-4 grid grid-cols-2 gap-4 mb-6">
          <div>
            <p class="text-xs text-gray-400 mb-1">Assignee:</p>
            <p id="modal-assignee" class="font-bold text-gray-800 text-sm"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Priority:</p>
            <span id="modal-priority" class="inline-block text-xs font-bold px-3 py-1 rounded-full"></span>
          </div>
        </div>

        <div class="flex justify-end">
          <button onclick="closeModal()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-7 py-2.5 rounded-xl font-semibold text-sm transition-colors">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <style>
    .active-tab { background: #4f46e5; color: white; }
    .tab-btn:not(.active-tab):hover { background: #f1f5f9; }
  </style>

  <script>
    //Auth guard
    if (localStorage.getItem('git_tracker_auth') !== 'true') {
      window.location.href = 'login.html';
    }

    //States
    let allIssues    = [];
    let activeTab    = 'all';
    const BASE       = 'https://phi-lab-server.vercel.app/api/v1/lab';

    //DOM refs
    const loadingEl   = document.getElementById('loading');
    const errorEl     = document.getElementById('error-state');
    const emptyEl     = document.getElementById('empty-state');
    const gridEl      = document.getElementById('cards-grid');
    const totalEl     = document.getElementById('issue-total');

    //Fetch all issues
    async function loadIssues() {
      showLoading();
      try {
        const res  = await fetch(`${BASE}/issues`);
        const data = await res.json();
        allIssues = Array.isArray(data) ? data : (data.issues || data.data || []);
        renderIssues(filterIssues(allIssues));
        updateTotal(allIssues);
        updateTabCounts();
      } catch(err) {
        showError();
      }
    }

    // Filter by tab
    function filterIssues(list) {
      if (activeTab === 'open')   return list.filter(i => (i.status || i.state || '').toLowerCase() === 'open');
      if (activeTab === 'closed') return list.filter(i => (i.status || i.state || '').toLowerCase() === 'closed');
      return list;
    }

    // Switch tab
    function switchTab(tab) {
      activeTab = tab;

      // Reset all tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active-tab');
        btn.classList.add('text-gray-500');
        // Reset count badge style to default
        const badge = btn.querySelector('span');
        if (badge) {
          badge.className = 'text-xs font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full';
        }
      });

      // Activate clicked tab
      const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
      activeBtn.classList.add('active-tab');
      activeBtn.classList.remove('text-gray-500');
      // Active badge
      const activeBadge = activeBtn.querySelector('span');
      if (activeBadge) {
        activeBadge.className = 'text-xs font-bold bg-white/25 text-white px-2 py-0.5 rounded-full';
      }

      renderIssues(filterIssues(allIssues));
    }

    // Search 
    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) { renderIssues(filterIssues(allIssues)); return; }
      showLoading();
      try {
        const res  = await fetch(`${BASE}/issues/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        const results = Array.isArray(data) ? data : (data.issues || data.data || []);
        renderIssues(results);
      } catch(err) {
        showError();
      }
    }

    //Render cards
    function renderIssues(list) {
      hideAll();
      if (!list || list.length === 0) { emptyEl.classList.remove('hidden'); return; }

      gridEl.innerHTML = '';
      list.forEach((issue, idx) => {
        const card = buildCard(issue, idx);
        gridEl.appendChild(card);
      });
      gridEl.classList.remove('hidden');
    }

    // Build one card
    function buildCard(issue, idx) {
      const status    = (issue.status || issue.state || 'open').toLowerCase();
      const priority  = (issue.priority || 'LOW').toUpperCase();
      const title     = issue.title || 'Untitled Issue';
      const desc      = issue.description || issue.body || '';
      const author    = issue.author || issue.user?.login || 'unknown';
      const number    = issue.number || issue.id || idx + 1;
      const date      = issue.created_at || issue.createdAt || '';
      const labels    = issue.labels || [];

      const borderClass = status === 'open' ? 'card-open' : 'card-closed';
      const statusIcon  = status === 'open'
        ? `<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93 19.07 19.07"/></svg>`
        : `<svg class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;

      const priorityClass = `priority-${priority}`;
      const shortDesc = desc.length > 80 ? desc.slice(0, 80) + '…' : desc;
      const formattedDate = date ? new Date(date).toLocaleDateString('en-US') : '';

      const labelsHTML = labels.slice(0, 2).map(l => {
        const name = (l.name || l).toLowerCase();
        let cls = 'label-default';
        if (name.includes('bug'))         cls = 'label-bug';
        else if (name.includes('help'))   cls = 'label-help-wanted';
        else if (name.includes('feat'))   cls = 'label-feature';
        else if (name.includes('enhan'))  cls = 'label-enhancement';
        else if (name.includes('doc'))    cls = 'label-documentation';
        const icon = name.includes('bug') ? '🐛' : name.includes('help') ? '🤝' : '🏷';
        return `<span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full ${cls}">${icon} ${(l.name || l).toUpperCase()}</span>`;
      }).join('');

      const div = document.createElement('div');
      div.className = `${borderClass} bg-white rounded-xl shadow-sm border border-gray-200 p-5 cursor-pointer hover:shadow-md transition-shadow fade-in`;
      div.style.animationDelay = `${idx * 30}ms`;
      div.innerHTML = `
        <div class="flex items-center justify-between mb-3">
          ${statusIcon}
          <span class="text-xs font-bold px-2.5 py-1 rounded-full ${priorityClass}">${priority}</span>
        </div>
        <h3 class="font-bold text-gray-900 text-sm leading-snug mb-2">${title}</h3>
        <p class="text-xs text-gray-500 leading-relaxed mb-3">${shortDesc}</p>
        <div class="flex flex-wrap gap-1 mb-3">${labelsHTML}</div>
        <div class="border-t border-gray-100 pt-3 text-xs text-gray-400 space-y-0.5">
          <p>#${number} by <span class="font-medium text-gray-600">${author}</span></p>
          <p>${formattedDate}</p>
        </div>`;

      div.addEventListener('click', () => openModal(issue));
      return div;
    }

    // Modal
    async function openModal(issue) {
      // Try fetching full details
      let full = issue;
      try {
        const id = issue.id || issue.number;
        if (id) {
          const res  = await fetch(`${BASE}/issue/${id}`);
          const data = await res.json();
          full = data.issue || data.data || data || issue;
        }
      } catch(_) {}

      const status   = (full.status || full.state || 'open').toLowerCase();
      const priority = (full.priority || 'LOW').toUpperCase();
      const author   = full.author || full.user?.login || 'Unknown';
      const date     = full.created_at || full.createdAt || '';
      const labels   = full.labels || [];

      document.getElementById('modal-title').textContent = full.title || 'Untitled';
      document.getElementById('modal-desc').textContent  = full.description || full.body || 'No description provided.';
      document.getElementById('modal-assignee').textContent = author;

      // Status badge
      const statusColor = status === 'open' ? 'bg-green-500' : 'bg-purple-500';
      const statusLabel = status === 'open' ? 'Opened' : 'Closed';
      const formattedDate = date ? new Date(date).toLocaleDateString('en-GB').replace(/\//g, '/') : '';

      document.getElementById('modal-meta').innerHTML = `
        <span class="${statusColor} text-white text-xs font-bold px-3 py-1 rounded-full">${statusLabel}</span>
        <span class="text-gray-400">•</span>
        <span>${statusLabel} by ${author}</span>
        <span class="text-gray-400">•</span>
        <span>${formattedDate}</span>`;

      // Priority badge
      const priorityClass = `priority-${priority}`;
      const pEl = document.getElementById('modal-priority');
      pEl.textContent  = priority;
      pEl.className    = `inline-block text-xs font-bold px-3 py-1 rounded-full ${priorityClass}`;

      // Labels
      document.getElementById('modal-labels').innerHTML = labels.map(l => {
        const name = (l.name || l).toLowerCase();
        let cls = 'label-default';
        if (name.includes('bug'))        cls = 'label-bug';
        else if (name.includes('help'))  cls = 'label-help-wanted';
        else if (name.includes('feat'))  cls = 'label-feature';
        else if (name.includes('enhan')) cls = 'label-enhancement';
        else if (name.includes('doc'))   cls = 'label-documentation';
        const icon = name.includes('bug') ? '🐛' : name.includes('help') ? '🤝' : '🏷';
        return `<span class="inline-flex items-center gap-1 text-xs font-semibold px-3 py-1 rounded-full ${cls}">${icon} ${(l.name || l).toUpperCase()}</span>`;
      }).join('');

      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.add('hidden');
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    
  </script>

  
</body>
</html>
