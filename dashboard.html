<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>GitHub Issues Tracker – Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }

    @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .modal-in { animation: modalIn 0.2s ease forwards; }

    .card-open  { border-top: 3px solid #22c55e; }
    .card-closed { border-top: 3px solid #a855f7; }

    .priority-HIGH   { background:#fee2e2; color:#dc2626; }
    .priority-MEDIUM { background:#fef9c3; color:#ca8a04; }
    .priority-LOW    { background:#f1f5f9; color:#64748b; }

    .label-bug         { background:#fee2e2; color:#dc2626; }
    .label-help-wanted { background:#fef3c7; color:#b45309; }
    .label-feature     { background:#dbeafe; color:#2563eb; }
    .label-enhancement { background:#dcfce7; color:#16a34a; }
    .label-documentation { background:#ede9fe; color:#7c3aed; }
    .label-default     { background:#f1f5f9; color:#475569; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">

      <!-- logo -->
      <div class="flex items-center gap-2 shrink-0">
        <svg class="w-7 h-7" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
          <path fill="#1b1f23" fill-rule="evenodd" clip-rule="evenodd"
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
        </svg>
        <span class="font-bold text-gray-900 text-lg">GitHub Issues Tracker</span>
      </div>

      <!-- Search -->
      <div class="flex items-center gap-3 flex-1 justify-end">
        <div class="relative flex-1 max-w-xs">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search issues..."
            class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-gray-50"
            onkeydown="if(event.key==='Enter') doSearch()" />
        </div>
        <button onclick="doSearch()"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors hidden sm:block">
          Search
        </button>
      </div>
    </div>
  </nav>


<!-- ── MAIN ── -->
  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- Tabs -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-2 inline-flex gap-1 mb-6">
      <button data-tab="all" onclick="switchTab('all')"
        class="tab-btn active-tab px-5 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
        All
        <span id="count-all" class="text-xs font-bold bg-white/30 px-2 py-0.5 rounded-full">—</span>
      </button>
      <button data-tab="open" onclick="switchTab('open')"
        class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2">
        Open
        <span id="count-open" class="text-xs font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">—</span>
      </button>
      <button data-tab="closed" onclick="switchTab('closed')"
        class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2">
        Closed
        <span id="count-closed" class="text-xs font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">—</span>
      </button>
    </div>

    <!-- Issue summary bar -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 px-6 py-4 mb-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div>
          <p id="issue-total" class="font-bold text-gray-900 text-lg">— Issues</p>
          <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-5 text-sm font-medium">
        <span class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
          <span class="text-gray-600">Open</span>
          <span id="summary-open" class="font-bold text-green-600">—</span>
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"></span>
          <span class="text-gray-600">Closed</span>
          <span id="summary-closed" class="font-bold text-purple-600">—</span>
        </span>
      </div>
    </div>


 <!-- Loading spinner -->
    <div id="loading" class="flex justify-center py-20">
      <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full spin"></div>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden text-center py-20 text-gray-500">
      <p class="text-4xl mb-3">⚠️</p>
      <p class="font-semibold text-gray-700">Failed to load issues</p>
      <p class="text-sm mt-1">Check your connection and try again.</p>
      <button onclick="loadIssues()" class="mt-4 px-5 py-2 bg-indigo-600 text-white rounded-lg text-sm">Retry</button>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20 text-gray-400">
      <p class="text-4xl mb-3">📭</p>
      <p class="font-semibold text-gray-600">No issues found</p>
      <p class="text-sm mt-1">Try a different search or filter.</p>
    </div>

    <!-- Cards grid -->
    <div id="cards-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

  </main>











<script src="./script.js"></script>
</body>
</html>
