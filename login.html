<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker – Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center">

  <!-- top blue bar -->
  <div class="w-16 h-1 bg-blue-500 rounded-full mb-8"></div>

  <!-- login card -->
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-md px-10 py-10">

    <!-- logo -->
    <div class="flex flex-col items-center mb-6">
      <svg class="w-16 h-16 mb-3" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
        <path fill="#1b1f23" fill-rule="evenodd" clip-rule="evenodd"
          d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
      </svg>
      <h1 class="text-xl font-bold text-gray-900">GitHub Issues Tracker</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to manage your issues</p>
    </div>

    <!-- form -->
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input id="username" type="text" placeholder="Enter Username"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <p class="text-xs text-blue-500 mt-1">Default: admin</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" placeholder="Enter Password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <p class="text-xs text-blue-500 mt-1">Default: admin123</p>
      </div>

      <!-- error -->
      <p id="error-msg" class="hidden text-red-500 text-sm font-medium"></p>

      <button id="login-btn" onclick="handleLogin()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
        Sign In
      </button>
    </div>

    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400">OR</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <div class="bg-gray-50 rounded-xl p-4 text-center text-sm text-gray-600">
      <p class="mb-2 font-medium">Demo Credentials:</p>
      <p><span class="font-semibold">Username:</span> admin</p>
      <p><span class="font-semibold">Password:</span> admin123</p>
    </div>
  </div>

  <script>
    // If already logged in, skip to dashboard
    if (localStorage.getItem('git_tracker_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('error-msg');

      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem('git_tracker_auth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.textContent = 'Invalid credentials. Use admin / admin123.';
        errorMsg.classList.remove('hidden');
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
